name: Build Test Publish SDK Client

on:
  workflow_dispatch:
    inputs:
      publish_npm:
        description: 'Publish package to npm'
        required: true
        default: 'true'
        type: choice
        options: ['true', 'false']
      deploy_cdn:
        description: 'Deploy build to CDN'
        required: true
        default: 'true'
        type: choice
        options: ['true', 'false']

permissions:
  id-token: write
  contents: read

jobs:
  build_test:
    name: Build, Test & (Optional) Publish
    runs-on: ubuntu-latest
    environment: CLOUDFRONT_S3_BUCKET

    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      REGION: ${{ vars.REGION }}
      PARAMETER_PATH: ${{ vars.PARAMETER_PATH }}
      S3_BUCKET: ${{ vars.S3_BUCKET }}
      ENV_STATIC_FILE: ${{ vars.ENV_STATIC_FILE }}
      CHARACTER_LENGHT: ${{ vars.CHARACTER_LENGHT }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Configure AWS credentials using OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Fetch environment files
        run: aws ssm get-parameters-by-path --path "$PARAMETER_PATH" --region "$REGION" --with-decryption --query "Parameters[*].{Name:Name,Value:Value}" --output json | jq -r '.[] | "\(.Name)=\(.Value)"' >> .env

      - name: Print env
        run: cat .env

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test --if-present

      - name: Build
        run: npm run build

      - name: Publish to npm
        if: github.event_name == 'workflow_dispatch' && inputs.publish_npm == 'true'
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdk-dist
          path: rocketfuel-sdk-client/dist

  deploy_cdn:
    name: Deploy CDN (CloudFront)
    runs-on: ubuntu-latest
    needs: build_test
    if: github.event_name == 'workflow_dispatch' && inputs.deploy_cdn == 'true'
    environment: CLOUDFRONT_S3_BUCKET

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: sdk-dist
          path: rocketfuel-sdk-client/dist

      - name: Configure AWS credentials using OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Upload assets to S3
        run: aws s3 sync rocketfuel-sdk-client/dist s3://${{ vars.CLOUDFRONT_S3_BUCKET }} --delete

      - name: Invalidate CloudFront cache
        run: aws cloudfront create-invalidation \
          --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
          --paths "/*"
