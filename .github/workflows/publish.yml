name: Build Test Publish SDK Client

on:
  workflow_dispatch:
    inputs:
      publish_npm:
        description: 'Publish package to npm'
        required: true
        default: 'true'
        type: choice
        options: ['true', 'false']
      deploy_cdn:
        description: 'Deploy build to CDN'
        required: true
        default: 'true'
        type: choice
        options: ['true', 'false']

jobs:
  build_test:
    name: Build and Test
    runs-on: ubuntu-latest
    environment: CLOUDFRONT_S3_BUCKET


    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      REGION: ${{ vars.REGION }}
      PARAMETER_PATH: ${{ vars.PARAMETER_PATH }}
      S3_BUCKET: ${{ vars.S3_BUCKET }}
      ENV_STATIC_FILE: ${{ vars.ENV_STATIC_FILE }}
      CHARACTER_LENGHT: ${{ vars.CHARACTER_LENGHT }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Fetch environment files
        run: |
          aws ssm get-parameters-by-path \
            --path ${{ env.PARAMETER_PATH }} \
            --region ${{ env.REGION }} \
            --with-decryption \
            --query "Parameters[*].{Name:Name,Value:Value}" \
            --output json | jq .[] | jq -r '.Name+"="+.Value' | cut -c ${{ env.CHARACTER_LENGHT }} >> .env

      - name: Print env
        run: cat .env

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test --if-present

      - name: Build
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdk-dist
          path: rocketfuel-sdk-client/dist

  publish_npm:
    name: Publish npm
    runs-on: ubuntu-latest
    needs: build_test
    if: github.event_name == 'workflow_dispatch' && inputs.publish_npm == 'true'

    defaults:
      run:
        working-directory: rocketfuel-sdk-client

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  deploy_cdn:
    name: Deploy CDN (CloudFront/Cloudflare)
    runs-on: ubuntu-latest
    needs: build_test
    if: github.event_name == 'workflow_dispatch' && inputs.deploy_cdn == 'true'
    environment: CLOUDFRONT_S3_BUCKET


    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      REGION: ${{ vars.REGION }}
      PARAMETER_PATH: ${{ vars.PARAMETER_PATH }}
      S3_BUCKET: ${{ vars.S3_BUCKET }}
      ENV_STATIC_FILE: ${{ vars.ENV_STATIC_FILE }}
      CHARACTER_LENGHT: ${{ vars.CHARACTER_LENGHT }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: sdk-dist
          path: rocketfuel-sdk-client/dist

      - name: Configure AWS credentials using OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Upload assets to S3 for CloudFront
        run: aws s3 sync rocketfuel-sdk-client/dist s3://${{ secrets.CLOUDFRONT_S3_BUCKET }}

      - name: Invalidate CloudFront cache
        run: aws cloudfront create-invalidation \
          --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
          --paths "/*"
